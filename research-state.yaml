workflow_status:
  synth500_balanced_plan_workflow: implemented
  note: >-
    A plan-driven synth-only workflow is now available for a balanced 500-case
    DTPQA experiment across categories 1-6. The workflow includes a shared
    planning artifact, plan-driven smoke/full runners for edge_only,
    cloud_only, and hybrid execution, a multi-category three-way report
    builder, and a shadow skill-refinement report path with category-isolated
    skill stores.
  synth500_smoke_status: passed
  synth500_smoke_note: >-
    The 18-case multi-category smoke completed successfully after resuming one
    cloud-only timeout case with a 600-second request timeout. The launcher now
    supports explicit `request_timeout_seconds` and `max_retries` settings for
    more robust long-running synth-500 execution.
next_actions:
  - Run the full synth-500 workflow on the shared plan with a longer request
    timeout and persist resumable artifacts for `edge_only`, `cloud_only`, and
    `hybrid`.
  - Build the multi-category three-way report once all three 500-case runs are
    complete on the shared plan.
  - Run the shadow skill-refinement workflow with category-isolated skill stores
    and summarize holdout generalization separately from the benchmark-faithful
    three-way comparison.
  - Produce a paper-facing progress report once the synth-500 three-way and
    refinement summaries are complete.
diagnostics:
  reflection_trigger_issue: >-
    Confirmed. The original entropy/fallback gate never fired on the dominant
    real DTPQA failure mode because confident false negatives stayed below the
    `1.0` entropy threshold.
  reflection_prompt_leakage: >-
    Fixed. `ground_truth_answer` was removed from the cloud reflection prompt.
  reflection_timeout_mismatch: >-
    Confirmed. The old clean MCP server on port 8002 was launched without
    `REQUEST_TIMEOUT_SECONDS`, so reflection could time out server-side even
    when the replay client waited longer.
  reflection_format_alignment: >-
    Fixed in code and verified by direct MCP probes on historical records:
    `annotations-9594` now reflects to `Yes`, while the negative
    `annotations-11749` remains `No`.
  benchmark_persistence_contamination: >-
    Fixed. DTPQA reflections no longer persist benchmark-derived skills into
    the shared skill store, and the formal same-day control run now uses a new
    empty store `/tmp/dtpqa_skills_clean_20260331T173713` because the previous
    "clean" store was already contaminated by an earlier debugging probe.
  batch_runner_failure_swallowing: >-
    Confirmed and fixed in the current experiment script. The previous
    `run_large_scale_200.sh` piped replay output through `tail` without
    `pipefail`, so failed offsets were silently skipped while the script still
    reported success.
  mcp_endpoint_mismatch: >-
    Confirmed and fixed in the current experiment script. The batch harness was
    probing `8003` but the replay client still defaulted to `http://127.0.0.1:8000/mcp`,
    so clean client-side `/tmp` stores were not actually isolating the live MCP server.
  dtpqa_reflection_anchor_bias: >-
    Supported. Clean targeted runs showed `cloud_only` corrected far false
    negatives at offsets `7` and `15`, while the old reflection path preserved
    or worsened them. Replacing DTPQA/category_1 reflection with direct cloud
    re-perception recovered those offsets.
