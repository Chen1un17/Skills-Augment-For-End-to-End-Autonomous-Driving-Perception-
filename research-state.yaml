project:
  name: ad-cornercase
  question: >-
    How can a training-free hierarchical edge-cloud VLM system improve perception
    robustness on autonomous-driving corner cases, especially under degraded
    vision and distance-sensitive traffic perception benchmarks?
  status: in_progress
  loop_continuity:
    cron_available: false
    note: >-
      No session cron or /loop primitive is available in this environment, so
      continuity is maintained through research-state.yaml, findings.md, and
      research-log.md.
current_focus:
  benchmark: DTPQA
  rationale: >-
    DTPQA integration is implemented end-to-end. The current loop has shifted
    from infrastructure hardening to benchmark-faithful synth/category_1
    comparisons under a clean MCP server, with the main question now being why
    cloud reflection regressed relative to edge-only and how to recover that
    loss without contaminating the benchmark.
  dataset_download_blocker: false
  environment_blocker: >-
    The runtime and dataset path are resolved. The current blockers are a
    benchmark-control problem rather than a loader problem: batch scripts were
    silently swallowing failed cases, client and server were using different
    MCP ports/URLs, clean hybrid runs were unknowingly reading the historical
    `data/skills` store, and DTPQA reflection could still anchor on the edge
    answer or return malformed `Yes/No` outputs on hard far-range cases.
hypotheses:
  - id: H1
    name: DTPQA integration via AnomalyCase reuse
    prediction: >-
      DTPQA can be mapped into the existing replay pipeline without a separate
      orchestration stack by normalizing samples into AnomalyCase.
    status: confirmed
  - id: H2
    name: Distance-stratified evaluation reveals far-range degradation
    prediction: >-
      Large-scale DTPQA validation will show lower judge/alignment performance on
      far-distance bins than near-range bins, and skill reuse/reflection should
      be tracked separately.
    status: supported
  - id: H3
    name: Case metadata preservation is required for benchmark-quality evaluation
    prediction: >-
      The existing replay artifacts lose benchmark-specific metadata, so the
      orchestrator must persist case metadata for distance-aware analysis.
    status: confirmed
  - id: H4
    name: Reflection regressions are dominated by benchmark-integrity failures
    prediction: >-
      The apparent synth/hybrid degradation is driven first by contaminated
      skill matching and silent batch failures rather than a pure model-quality
      issue. Clean runs with isolated MCP state should remove most of the
      earlier regression.
    status: supported
  - id: H5
    name: Baseline-anchored reflection underuses cloud-model capability
    prediction: >-
      For DTPQA category_1 false negatives, direct cloud re-perception will
      outperform the prior text reflection prompt because the cloud model can
      answer some far-range cases correctly when not anchored to the edge
      model's wrong `No` explanation.
    status: supported
